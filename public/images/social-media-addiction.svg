<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DBEAFE"/>
      <stop offset="100%" style="stop-color:#BFDBFE"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <!-- Phone (large, central) -->
  <rect x="210" y="60" width="180" height="280" rx="24" fill="#1E40AF"/>
  <rect x="222" y="76" width="156" height="220" rx="10" fill="#EFF6FF"/>
  <circle cx="300" cy="318" r="10" fill="#3B82F6"/>
  <!-- App icons on screen -->
  <rect x="238" y="92" width="44" height="44" rx="10" fill="#4267B2"/>
  <text x="260" y="122" text-anchor="middle" font-family="sans-serif" font-size="20" fill="white" font-weight="bold">f</text>
  <rect x="292" y="92" width="44" height="44" rx="10" fill="#E1306C"/>
  <circle cx="314" cy="114" r="10" fill="none" stroke="white" stroke-width="2.5"/>
  <circle cx="314" cy="114" r="4" fill="white"/>
  <rect x="346" y="92" width="44" height="44" rx="10" fill="#1DA1F2"/>
  <path d="M356 118 Q362 108 372 112 Q368 104 378 106" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Notification badges -->
  <circle cx="280" cy="88" r="10" fill="#DC2626"/>
  <text x="280" y="93" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white" font-weight="bold">9+</text>
  <circle cx="334" cy="88" r="10" fill="#DC2626"/>
  <text x="334" y="93" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white" font-weight="bold">5</text>
  <!-- Like / heart icons floating -->
  <text x="140" y="160" font-family="sans-serif" font-size="32" fill="#E1306C" opacity="0.8">♥</text>
  <text x="430" y="140" font-family="sans-serif" font-size="24" fill="#E1306C" opacity="0.6">♥</text>
  <text x="460" y="200" font-family="sans-serif" font-size="20" fill="#3B82F6" opacity="0.7">👍</text>
  <text x="110" y="220" font-family="sans-serif" font-size="18" fill="#3B82F6" opacity="0.6">💬</text>
  <!-- Clock showing late night usage -->
  <circle cx="480" cy="280" r="34" fill="white" stroke="#BFDBFE" stroke-width="3"/>
  <line x1="480" y1="280" x2="480" y2="258" stroke="#1D4ED8" stroke-width="3" stroke-linecap="round"/>
  <line x1="480" y1="280" x2="498" y2="285" stroke="#DC2626" stroke-width="3" stroke-linecap="round"/>
  <circle cx="480" cy="280" r="4" fill="#1D4ED8"/>
  <!-- Label -->
  <text x="300" y="360" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="600" fill="#1D4ED8">Social Media Addiction</text>
  <text x="300" y="382" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1E40AF">Add your photo to /public/images/social-media-addiction.jpg</text>
</svg>
