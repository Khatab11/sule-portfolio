<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D1FAE5"/>
      <stop offset="100%" style="stop-color:#A7F3D0"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <!-- Sofa shape -->
  <rect x="120" y="220" width="360" height="100" rx="20" fill="#6EE7B7"/>
  <rect x="100" y="180" width="80" height="140" rx="16" fill="#34D399"/>
  <rect x="420" y="180" width="80" height="140" rx="16" fill="#34D399"/>
  <rect x="140" y="160" width="320" height="80" rx="14" fill="#34D399"/>
  <!-- Person sitting -->
  <circle cx="300" cy="145" r="32" fill="#065F46"/>
  <rect x="270" y="175" width="60" height="70" rx="10" fill="#065F46"/>
  <!-- Laptop screen -->
  <rect x="255" y="200" width="90" height="56" rx="6" fill="#ECFDF5"/>
  <rect x="240" y="254" width="120" height="8" rx="4" fill="#6EE7B7"/>
  <!-- Screen glow -->
  <rect x="265" y="210" width="70" height="38" rx="3" fill="#3B82F6" opacity="0.3"/>
  <!-- WiFi icon -->
  <path d="M340 80 Q370 60 400 80" stroke="#16A34A" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M350 95 Q370 78 390 95" stroke="#16A34A" stroke-width="5" fill="none" stroke-linecap="round"/>
  <circle cx="370" cy="108" r="6" fill="#16A34A"/>
  <!-- Label -->
  <text x="300" y="360" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="600" fill="#065F46">Sofalizing</text>
  <text x="300" y="382" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#047857">Add your photo to /public/images/sofalizing.jpg</text>
</svg>
